openapi: 3.0.0
paths:
  /admin/reports:
    get:
      operationId: AdminController_getAllReports
      parameters:
        - name: isDeleted
          required: true
          in: query
          schema:
            type: boolean
        - name: category
          required: false
          in: query
          schema:
            enum:
              - trash
              - forest
              - beetle
              - permits
              - misc
            type: string
      responses:
        '200':
          description: All reports have been successfully found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FullReportDto'
      tags:
        - admin
      security:
        - bearer: []
    post:
      operationId: AdminController_updateReport
      parameters: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateReportDto'
      responses:
        '200':
          description: Report has been successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FullReportDto'
        '201':
          description: ''
          content:
            application/json:
              schema:
                type: object
      tags:
        - admin
      security:
        - bearer: []
  /admin/reports/{refId}:
    get:
      operationId: AdminController_getReportById
      parameters:
        - name: refId
          required: true
          in: path
          schema:
            type: number
      responses:
        '200':
          description: Single full report has been successfully found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FullReportDto'
        '404':
          description: Report not found
      tags:
        - admin
      security:
        - bearer: []
  /admin/dumps/{refId}:
    get:
      operationId: AdminController_getDumpById
      parameters:
        - name: refId
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Single full dump has been successfully found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FullDumpDto'
        '404':
          description: Dump not found
      tags:
        - admin
      security:
        - bearer: []
  /admin/reports/transfer:
    post:
      operationId: AdminController_transferReport
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferReportDto'
      responses:
        '200':
          description: Report has been successfully transferred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferReportDto'
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FullReportDto'
      tags:
        - admin
      security:
        - bearer: []
  /admin/dumps:
    get:
      operationId: AdminController_getAllDumps
      parameters: []
      responses:
        '200':
          description: All dumps have been successfully found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FullDumpDto'
      tags:
        - admin
      security:
        - bearer: []
    post:
      operationId: AdminController_updateDump
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDumpDto'
      responses:
        '200':
          description: Dump has been successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FullDumpDto'
        '201':
          description: ''
          content:
            application/json:
              schema:
                type: object
      tags:
        - admin
      security:
        - bearer: []
    put:
      operationId: AdminController_createDump
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDumpDto'
      responses:
        '200':
          description: Dump has been successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FullDumpDto'
      tags:
        - admin
      security:
        - bearer: []
  /admin/statistics/category:
    get:
      operationId: AdminController_getReportCategoryAnalytics
      parameters:
        - name: dateFrom
          required: false
          in: query
          description: 'Start date, ex.: 2024-01-01'
          schema:
            type: string
        - name: dateTo
          required: false
          in: query
          description: 'End date, ex.: 2024-12-31'
          schema:
            type: string
        - name: category
          required: false
          in: query
          schema:
            enum:
              - trash
              - forest
              - beetle
              - permits
              - misc
            type: string
        - name: status
          required: false
          in: query
          description: Filter by status string
          schema:
            type: string
      responses:
        '200':
          description: 'Category-sorted report analytics have been successfully fetched. '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportCategoryAnalyticsDto'
      tags:
        - admin
      security:
        - bearer: []
  /dumps:
    get:
      operationId: DumpController_getAllVisibleDumps
      parameters: []
      responses:
        '200':
          description: All visible dumps have been successfully found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DumpDto'
      tags:
        - dumps
  /reports:
    post:
      operationId: ReportController_createNewReport
      parameters: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateReportDto'
      responses:
        '201':
          description: New Report has been successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicReportDto'
      tags:
        - reports
    get:
      operationId: ReportController_getAllPublicReports
      parameters:
        - name: category
          required: false
          in: query
          schema:
            enum:
              - trash
              - forest
              - beetle
              - permits
              - misc
            type: string
      responses:
        '200':
          description: All visible reports have been successfully found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PublicReportDto'
      tags:
        - reports
  /reports/statistics:
    get:
      operationId: ReportController_getReportStatistics
      parameters:
        - name: category
          required: false
          in: query
          schema:
            enum:
              - trash
              - forest
              - beetle
              - permits
              - misc
            type: string
      responses:
        '200':
          description: Report statistics have been successfully fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportStatisticsDto'
      tags:
        - reports
  /reports/{refId}:
    get:
      operationId: ReportController_getReportById
      parameters:
        - name: refId
          required: true
          in: path
          schema:
            type: number
      responses:
        '200':
          description: Report has been successfully found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicReportDto'
        '404':
          description: Report not found
      tags:
        - reports
  /reports/feedback-report:
    post:
      operationId: ReportController_sendFeedbackReport
      parameters: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateFeedbackReportDto'
      responses:
        '200':
          description: New feedback report has been successfully sent
          content:
            application/json:
              schema:
                type: string
        '201':
          description: ''
          content:
            application/json:
              schema:
                type: string
      tags:
        - reports
  /reports/geojson:
    post:
      operationId: ReportController_getGeojson
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JsonCoordsDto'
      responses:
        '200':
          description: GeoJSON objects successfully fetched
          content:
            application/json:
              schema:
                type: string
        '201':
          description: ''
          content:
            application/json:
              schema:
                type: string
      tags:
        - reports
  /auth/login:
    post:
      operationId: AuthController_login
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestDto'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogInDto'
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogInDto'
      tags:
        - auth
info:
  title: Tvarkau Lietuva API
  description: API skirtas Tvarkau Lietuva projektui
  version: '1.0'
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    bearer:
      scheme: Bearer
      bearerFormat: JWT
      description: 'Please enter token in following format: Bearer <JWT>'
      type: http
      in: Header
  schemas:
    HistoryEditsDto:
      type: object
      properties:
        field:
          type: string
        change:
          type: string
      required:
        - field
        - change
    HistoryDataDto:
      type: object
      properties:
        user:
          type: string
        date:
          format: date-time
          type: string
        edits:
          type: array
          items:
            $ref: '#/components/schemas/HistoryEditsDto'
      required:
        - user
        - date
        - edits
    StatusRecordsDto:
      type: object
      properties:
        status:
          type: string
        date:
          format: date-time
          type: string
      required:
        - status
        - date
    FullReportDto:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        category:
          enum:
            - trash
            - forest
            - beetle
            - permits
            - misc
          type: string
        refId:
          type: string
        longitude:
          type: number
          format: double
        latitude:
          type: number
          format: double
        email:
          type: string
        inspection:
          type: string
          nullable: true
        inspectionId:
          type: string
          nullable: true
        isVisible:
          type: boolean
        isDeleted:
          type: boolean
        isTransferred:
          type: boolean
          nullable: true
        comment:
          type: string
        status:
          type: string
        reportDate:
          format: date-time
          type: string
        officerImageUrls:
          type: array
          items:
            type: string
        imageUrls:
          type: array
          items:
            type: string
        historyData:
          type: array
          items:
            $ref: '#/components/schemas/HistoryDataDto'
        statusRecords:
          type: array
          items:
            $ref: '#/components/schemas/StatusRecordsDto'
        emailFeedbackStage:
          type: number
          format: double
      required:
        - _id
        - name
        - category
        - refId
        - longitude
        - latitude
        - email
        - isVisible
        - isDeleted
        - comment
        - status
        - reportDate
        - officerImageUrls
        - imageUrls
        - historyData
        - statusRecords
        - emailFeedbackStage
    FullDumpDto:
      type: object
      properties:
        refId:
          type: string
        name:
          type: string
        longitude:
          type: number
          format: double
        latitude:
          type: number
          format: double
        isVisible:
          type: boolean
        address:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        workingHours:
          type: string
        moreInformation:
          type: string
      required:
        - refId
        - name
        - longitude
        - latitude
        - isVisible
        - workingHours
        - moreInformation
    UpdateReportDto:
      type: object
      properties:
        refId:
          type: string
        name:
          type: string
        category:
          enum:
            - trash
            - forest
            - beetle
            - permits
            - misc
          type: string
        longitude:
          type: number
        latitude:
          type: number
        isVisible:
          type: boolean
        isDeleted:
          type: boolean
        comment:
          type: string
        status:
          type: string
        officerImageUrls:
          type: array
          items:
            type: string
        imageUrls:
          type: array
          items:
            type: string
        images:
          type: array
          items:
            type: string
            format: binary
      required:
        - refId
        - name
        - category
        - longitude
        - latitude
        - isVisible
        - isDeleted
        - comment
        - status
        - officerImageUrls
        - imageUrls
        - images
    TransferReportDto:
      type: object
      properties:
        refId:
          type: string
        name:
          type: string
        longitude:
          type: number
          format: double
        latitude:
          type: number
          format: double
        status:
          type: string
        reportDate:
          format: date-time
          type: string
        email:
          type: string
      required:
        - refId
        - name
        - longitude
        - latitude
        - status
        - reportDate
        - email
    UpdateDumpDto:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        longitude:
          type: number
        latitude:
          type: number
        isVisible:
          type: boolean
        address:
          type: string
        phone:
          type: string
        workingHours:
          type: string
        moreInformation:
          type: string
      required:
        - _id
        - name
        - longitude
        - latitude
        - isVisible
        - address
        - phone
        - workingHours
        - moreInformation
    CreateDumpDto:
      type: object
      properties:
        name:
          type: string
        reportLong:
          type: number
        reportLat:
          type: number
        address:
          type: string
        phone:
          type: string
        workingHours:
          type: string
        moreInformation:
          type: string
      required:
        - name
        - reportLong
        - reportLat
    OverallSummaryDto:
      type: object
      properties:
        totalReports:
          type: number
        resolvedReports:
          type: number
        inInvestigationReports:
          type: number
        receivedReports:
          type: number
        falseReports:
          type: number
        resolutionRate:
          type: number
        avgResolutionHours:
          type: number
        reportsPer30Days:
          type: number
        reportsLast7Days:
          type: number
        reportsLast30Days:
          type: number
        reportsLast90Days:
          type: number
        last30DaysChangePercent:
          type: number
      required:
        - totalReports
        - resolvedReports
        - inInvestigationReports
        - receivedReports
        - falseReports
        - resolutionRate
        - avgResolutionHours
        - reportsPer30Days
        - reportsLast7Days
        - reportsLast30Days
        - reportsLast90Days
    StatusDistributionItemDto:
      type: object
      properties:
        status:
          type: string
        count:
          type: number
        percentage:
          type: number
      required:
        - status
        - count
        - percentage
    CategoryBreakdownItemDto:
      type: object
      properties:
        category:
          type: string
        count:
          type: number
        percentage:
          type: number
        avgResolutionHours:
          type: number
      required:
        - category
        - count
        - percentage
        - avgResolutionHours
    RegionBreakdownItemDto:
      type: object
      properties:
        region:
          type: string
        count:
          type: number
        percentage:
          type: number
        avgResolutionHours:
          type: number
        statusDistribution:
          type: array
          items:
            $ref: '#/components/schemas/StatusDistributionItemDto'
      required:
        - region
        - count
        - percentage
        - avgResolutionHours
        - statusDistribution
    MonthlyTrendItemDto:
      type: object
      properties:
        period:
          type: string
        year:
          type: number
        month:
          type: number
        count:
          type: number
        resolved:
          type: number
        avgResolutionHours:
          type: number
        countChangePercent:
          type: number
        resolvedChangePercent:
          type: number
        resolutionTimeChangePercent:
          type: number
      required:
        - period
        - year
        - month
        - count
        - resolved
        - avgResolutionHours
    SlaPerformanceDto:
      type: object
      properties:
        within24h:
          type: number
          description: Reports resolved within 24 h
        within72h:
          type: number
          description: Reports resolved within 72 h
        within7d:
          type: number
          description: Reports resolved within 7 days
        within30d:
          type: number
          description: Reports resolved within 30 days
        over30d:
          type: number
          description: Reports not yet resolved or over 30 days
        within24hPercent:
          type: number
        within72hPercent:
          type: number
        within7dPercent:
          type: number
        within30dPercent:
          type: number
      required:
        - within24h
        - within72h
        - within7d
        - within30d
        - over30d
        - within24hPercent
        - within72hPercent
        - within7dPercent
        - within30dPercent
    ResolutionPerformanceDto:
      type: object
      properties:
        avgResolutionHours:
          type: number
        medianResolutionHours:
          type: number
        minResolutionHours:
          type: number
        maxResolutionHours:
          type: number
        sla:
          $ref: '#/components/schemas/SlaPerformanceDto'
        resolvedCount:
          type: number
          description: Resolved report count used for calculation
      required:
        - avgResolutionHours
        - medianResolutionHours
        - minResolutionHours
        - maxResolutionHours
        - sla
        - resolvedCount
    ReportCategoryAnalyticsDto:
      type: object
      properties:
        summary:
          $ref: '#/components/schemas/OverallSummaryDto'
        statusDistribution:
          type: array
          items:
            $ref: '#/components/schemas/StatusDistributionItemDto'
        categoryBreakdown:
          type: array
          items:
            $ref: '#/components/schemas/CategoryBreakdownItemDto'
        geographicBreakdown:
          type: array
          items:
            $ref: '#/components/schemas/RegionBreakdownItemDto'
        monthlyTrends:
          type: array
          items:
            $ref: '#/components/schemas/MonthlyTrendItemDto'
        resolutionPerformance:
          $ref: '#/components/schemas/ResolutionPerformanceDto'
        generatedAt:
          type: string
          description: ISO timestamp of when analytics were computed
      required:
        - summary
        - statusDistribution
        - categoryBreakdown
        - geographicBreakdown
        - monthlyTrends
        - resolutionPerformance
        - generatedAt
    DumpDto:
      type: object
      properties:
        name:
          type: string
        reportLong:
          type: number
          format: double
        reportLat:
          type: number
          format: double
        address:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        workingHours:
          type: string
        moreInformation:
          type: string
      required:
        - name
        - reportLong
        - reportLat
        - address
        - phone
        - workingHours
        - moreInformation
    CreateReportDto:
      type: object
      properties:
        automaticEmailsEnabled:
          type: boolean
        images:
          type: array
          items:
            type: string
            format: binary
        name:
          type: string
        longitude:
          type: number
        latitude:
          type: number
        category:
          type: string
          enum:
            - trash
            - forest
            - beetle
            - permits
            - misc
        email:
          type: string
      required:
        - automaticEmailsEnabled
        - images
        - name
        - longitude
        - latitude
        - category
        - email
    PublicReportDto:
      type: object
      properties:
        name:
          type: string
        category:
          enum:
            - trash
            - forest
            - beetle
            - permits
            - misc
          type: string
        refId:
          type: string
        longitude:
          type: number
          format: double
        latitude:
          type: number
          format: double
        comment:
          type: string
        status:
          type: string
        reportDate:
          format: date-time
          type: string
        officerImageUrls:
          type: array
          items:
            type: string
        imageUrls:
          type: array
          items:
            type: string
        statusRecords:
          type: array
          items:
            $ref: '#/components/schemas/StatusRecordsDto'
      required:
        - name
        - category
        - refId
        - longitude
        - latitude
        - comment
        - status
        - reportDate
        - officerImageUrls
        - imageUrls
        - statusRecords
    ReportStatisticsDto:
      type: object
      properties:
        totalSentReports:
          type: integer
        totalInInvestigationReports:
          type: integer
        totalInvestigatedReports:
          type: integer
        totalFalseReports:
          type: integer
      required:
        - totalSentReports
        - totalInInvestigationReports
        - totalInvestigatedReports
        - totalFalseReports
    CreateFeedbackReportDto:
      type: object
      properties:
        images:
          type: array
          items:
            type: string
            format: binary
        description:
          type: string
        email:
          type: string
      required:
        - description
        - email
    JsonCoordsDto:
      type: object
      properties:
        minLat:
          type: number
          format: double
        maxLat:
          type: number
          format: double
        minLong:
          type: number
          format: double
        maxLong:
          type: number
          format: double
      required:
        - minLat
        - maxLat
        - minLong
        - maxLong
    LoginRequestDto:
      type: object
      properties:
        accessKey:
          type: string
      required:
        - accessKey
    LogInDto:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        accessKey:
          type: string
      required:
        - name
        - email
        - accessKey